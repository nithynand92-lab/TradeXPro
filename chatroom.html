<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeXAI — Traders Chat Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase 8.10.1 — classic browser scripts, no modular SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root {
  --bg0:       #05060c;
  --bg1:       #080912;
  --bg2:       #0c0d1a;
  --bg3:       #101225;
  --bg4:       #14162e;
  --bg5:       #181a35;
  --glass:     rgba(255,255,255,0.030);
  --glass-h:   rgba(255,255,255,0.055);
  --border:    rgba(255,255,255,0.065);
  --border-m:  rgba(91,120,255,0.22);
  --border-hi: rgba(91,120,255,0.50);
  --blue:      #5b78ff;
  --indigo:    #7c5cfc;
  --green:     #00c87a;
  --rose:      #ff4d6d;
  --amber:     #f5b731;
  --t1: #eef0ff;
  --t2: rgba(238,240,255,0.65);
  --t3: rgba(238,240,255,0.35);
  --t4: rgba(238,240,255,0.18);
  --t5: rgba(238,240,255,0.08);
  --f-head: 'Syne', sans-serif;
  --f-body: 'DM Sans', sans-serif;
  --f-mono: 'JetBrains Mono', monospace;
  --radius-msg:  14px;
  --shadow-glow: 0 0 40px rgba(91,120,255,0.08);
  --shadow-msg:  0 2px 12px rgba(0,0,0,0.3);
  --header-h: 64px;
  --input-h:  76px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg0);
  color: var(--t1);
  font-family: var(--f-body);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(91,120,255,0.2); border-radius: 3px; }
* { scrollbar-width: thin; scrollbar-color: rgba(91,120,255,0.15) transparent; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 0%, rgba(91,120,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 85% 100%, rgba(124,92,252,0.05) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(91,120,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(91,120,255,0.018) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}

.app {
  position: relative; z-index: 1;
  height: 100vh;
  display: flex; flex-direction: column;
  max-width: 860px; margin: 0 auto;
  padding: 0 0 env(safe-area-inset-bottom);
}

/* ── HEADER ── */
.chat-header {
  height: var(--header-h); flex-shrink: 0;
  display: flex; align-items: center; gap: 12px; padding: 0 18px;
  background: rgba(8,9,18,0.85); border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  position: relative; z-index: 10;
}
.header-back {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--glass); border: 1px solid var(--border); color: var(--t3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; text-decoration: none; transition: all .18s;
}
.header-back:hover { background: var(--glass-h); color: var(--t1); border-color: var(--border-m); }
.header-icon {
  width: 38px; height: 38px; border-radius: 12px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--indigo) 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; box-shadow: 0 4px 16px rgba(91,120,255,0.3);
}
.header-info { flex: 1; min-width: 0; }
.header-title { font-family: var(--f-head); font-size: 16px; font-weight: 800; letter-spacing: -.3px; color: var(--t1); line-height: 1; }
.header-sub   { font-size: 11px; color: var(--t3); margin-top: 2px; display: flex; align-items: center; gap: 5px; }

.conn-pill {
  display: flex; align-items: center; gap: 4px;
  border-radius: 20px; padding: 3px 9px;
  font-size: 9px; font-weight: 700; letter-spacing: .6px;
  font-family: var(--f-mono); transition: all .3s;
}
.conn-pill.connecting { background:rgba(245,183,49,0.1);  border:1px solid rgba(245,183,49,0.2);  color:var(--amber); }
.conn-pill.connected  { background:rgba(0,200,122,0.09);  border:1px solid rgba(0,200,122,0.2);  color:var(--green); }
.conn-pill.error      { background:rgba(255,77,109,0.1);  border:1px solid rgba(255,77,109,0.2); color:var(--rose);  }
.conn-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
.conn-pill.connected .conn-dot { animation: pulse-green 2s infinite; }
@keyframes pulse-green {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(0,200,122,.45); }
  50%      { opacity:.6; box-shadow:0 0 0 4px rgba(0,200,122,0); }
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(5,6,12,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px; animation: fadeIn .25s ease;
}
.modal-overlay.hidden { display: none; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-card {
  background: var(--bg3); border: 1px solid var(--border-m); border-radius: 24px;
  padding: 36px 32px 32px; width: 100%; max-width: 400px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), var(--shadow-glow);
  animation: slideUp .3s cubic-bezier(.23,1,.32,1); position: relative; overflow: hidden;
}
.modal-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(91,120,255,0.5), transparent);
}
@keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
.modal-icon {
  width: 56px; height: 56px; border-radius: 18px;
  background: linear-gradient(135deg, rgba(91,120,255,0.2) 0%, rgba(124,92,252,0.15) 100%);
  border: 1px solid rgba(91,120,255,0.25);
  display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
}
.modal-title {
  font-family: var(--f-head); font-size: 22px; font-weight: 800; letter-spacing: -.4px;
  background: linear-gradient(100deg, #e8ecff 40%, rgba(124,92,252,.8));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 6px;
}
.modal-sub   { font-size: 12.5px; color: var(--t3); line-height: 1.55; margin-bottom: 24px; }
.field-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--t4); margin-bottom: 7px; }
.field-input {
  width: 100%; background: var(--bg1); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 15px; color: var(--t1); font-size: 14px;
  font-family: var(--f-body); outline: none; caret-color: var(--blue);
  transition: all .2s; margin-bottom: 6px;
}
.field-input:focus { border-color: var(--border-hi); background: rgba(91,120,255,0.04); box-shadow: 0 0 0 3px rgba(91,120,255,0.1); }
.field-input::placeholder { color: var(--t4); }
.field-hint { font-size: 10.5px; color: var(--t4); margin-bottom: 20px; }
.field-err  { font-size: 10.5px; color: var(--rose); margin-bottom: 12px; display: none; }
.field-err.show { display: block; }
.modal-btn {
  width: 100%; padding: 14px; border-radius: 12px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--indigo) 100%);
  border: none; color: #fff; font-family: var(--f-head); font-size: 14px; font-weight: 700;
  cursor: pointer; letter-spacing: .2px; transition: all .2s;
  box-shadow: 0 4px 20px rgba(91,120,255,0.35); position: relative; overflow: hidden;
}
.modal-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(91,120,255,0.45); }
.modal-btn:active { transform: translateY(0); }

/* ── MESSAGES ── */
.messages-wrap {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 20px 16px 10px; display: flex; flex-direction: column; gap: 3px; scroll-behavior: smooth;
}
.date-divider { display: flex; align-items: center; gap: 10px; margin: 12px 0 8px; }
.date-divider-line { flex: 1; height: 1px; background: var(--border); }
.date-divider-txt  { font-family: var(--f-mono); font-size: 9px; color: var(--t4); letter-spacing: .6px; white-space: nowrap; }

.msg-row { display: flex; gap: 9px; align-items: flex-end; padding: 2px 0; animation: msgIn .28s cubic-bezier(.23,1,.32,1) both; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg-row.own { flex-direction: row-reverse; }
.msg-avatar {
  width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-head); font-size: 12px; font-weight: 800; color: #fff; margin-bottom: 2px;
}
.msg-avatar.hidden { visibility: hidden; }
.msg-group { display: flex; flex-direction: column; gap: 2px; max-width: 68%; }
.msg-row.own .msg-group { align-items: flex-end; }
.msg-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; padding: 0 4px; }
.msg-row.own .msg-meta { flex-direction: row-reverse; }
.msg-username { font-size: 11px; font-weight: 700; color: var(--t2); font-family: var(--f-body); }
.msg-time     { font-family: var(--f-mono); font-size: 9px; color: var(--t4); }
.msg-bubble {
  padding: 10px 14px; border-radius: var(--radius-msg);
  font-size: 13.5px; line-height: 1.55; color: var(--t1);
  word-break: break-word; position: relative; box-shadow: var(--shadow-msg);
}
.msg-row:not(.own) .msg-bubble { background: var(--bg4); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg-row.own .msg-bubble {
  background: linear-gradient(135deg, var(--blue) 0%, var(--indigo) 100%);
  border: 1px solid rgba(91,120,255,0.4); border-bottom-right-radius: 4px;
  box-shadow: 0 4px 20px rgba(91,120,255,0.25), var(--shadow-msg);
}
.msg-bubble.cont-top { border-top-left-radius: 4px; }
.msg-bubble.cont-bot { border-bottom-left-radius: 4px; }
.msg-row.own .msg-bubble.cont-top { border-top-right-radius: 4px; }
.msg-row.own .msg-bubble.cont-bot { border-bottom-right-radius: 4px; }

.empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; padding: 40px 20px; }
.empty-icon-wrap { width:64px; height:64px; border-radius:20px; background:var(--bg3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; margin-bottom:4px; }
.empty-title { font-family: var(--f-head); font-size: 17px; font-weight: 800; color: var(--t2); }
.empty-sub   { font-size: 12px; color: var(--t3); max-width: 220px; line-height: 1.6; }

.typing-bar { height: 22px; flex-shrink: 0; display: flex; align-items: center; padding: 0 20px; font-size: 10.5px; color: var(--t4); font-style: italic; }

.load-overlay { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
.load-overlay.hidden { display: none; }
.load-spinner { width:36px; height:36px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt { font-size: 12px; color: var(--t3); }

/* ── INPUT ── */
.input-area {
  height: var(--input-h); flex-shrink: 0;
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
  background: rgba(8,9,18,0.9); border-top: 1px solid var(--border);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  position: relative; z-index: 10;
}
.input-wrap {
  flex: 1; display: flex; align-items: center;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 14px; padding: 0 14px; gap: 8px;
  transition: border-color .2s, background .2s, box-shadow .2s; height: 48px;
}
.input-wrap:focus-within { border-color: var(--border-hi); background: rgba(91,120,255,0.04); box-shadow: 0 0 0 3px rgba(91,120,255,0.08); }
.chat-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--t1); font-size: 13.5px; font-family: var(--f-body); caret-color: var(--blue); height: 100%;
}
.chat-input::placeholder { color: var(--t4); font-size: 12.5px; }
.chat-input:disabled { opacity: 0.4; cursor: not-allowed; }
.char-count { font-family: var(--f-mono); font-size: 9px; color: var(--t5); white-space: nowrap; flex-shrink: 0; transition: color .2s; }
.char-count.warn { color: var(--amber); }
.char-count.over { color: var(--rose); }
.send-btn {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--indigo) 100%);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .2s; box-shadow: 0 4px 16px rgba(91,120,255,0.3);
  position: relative; overflow: hidden;
}
.send-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(91,120,255,0.45); }
.send-btn:active { transform: scale(0.96); }
.send-btn:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }
.send-btn.pulse::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
  animation: ripple .35s ease-out;
}
@keyframes ripple { from{opacity:1;transform:scale(0)} to{opacity:0;transform:scale(2)} }

/* ── USER STRIP ── */
.user-strip { display:flex; align-items:center; gap:8px; padding:7px 16px; background:rgba(91,120,255,0.04); border-bottom:1px solid var(--border); flex-shrink:0; }
.user-strip-av { width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:#fff; }
.user-strip-name { font-size:11px; font-weight:600; color:var(--t3); }
.user-strip-badge { font-family:var(--f-mono); font-size:8.5px; font-weight:600; background:rgba(91,120,255,0.12); border:1px solid rgba(91,120,255,0.2); color:var(--blue); border-radius:5px; padding:1px 6px; letter-spacing:.4px; }
.user-strip-change { margin-left:auto; font-size:10px; font-weight:600; color:var(--blue); cursor:pointer; padding:3px 8px; border-radius:6px; transition:background .15s; }
.user-strip-change:hover { background:rgba(91,120,255,0.1); }

/* ── NEW MSG PILL ── */
.new-msg-pill {
  position:absolute; bottom:calc(var(--input-h) + 8px); left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg, var(--blue), var(--indigo)); border:none; border-radius:20px; padding:7px 16px;
  font-size:11px; font-weight:700; color:#fff; cursor:pointer; box-shadow:0 4px 20px rgba(91,120,255,0.4);
  display:flex; align-items:center; gap:6px; animation:pillIn .25s ease; z-index:50; font-family:var(--f-body);
}
.new-msg-pill.hidden { display:none; }
@keyframes pillIn { from{opacity:0;transform:translateX(-50%) translateY(6px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:rgba(255,77,109,0.15); border:1px solid rgba(255,77,109,0.3);
  border-radius:10px; padding:10px 18px; font-size:12px; color:var(--rose);
  z-index:9999; white-space:nowrap; animation:toastIn .25s ease; backdrop-filter:blur(12px); pointer-events:none;
}
.toast.success { background:rgba(0,200,122,0.12); border-color:rgba(0,200,122,0.25); color:var(--green); }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

@media (max-width:480px) {
  .msg-group { max-width:82%; }
  .modal-card { padding:28px 20px 24px; }
  .messages-wrap { padding:14px 10px 6px; }
  .input-area { padding:0 10px; gap:8px; }
}
</style>
</head>
<body>

<!-- USERNAME MODAL -->
<div class="modal-overlay" id="usernameModal">
  <div class="modal-card">
    <div class="modal-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(91,120,255,0.9)" stroke-width="1.8">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <div class="modal-title">Join the Trading Room</div>
    <div class="modal-sub">Set your trader username to start messaging live with other traders in real time.</div>
    <div class="field-label">Your Username</div>
    <input class="field-input" id="usernameInput" type="text"
      placeholder="e.g. AlphaTrader99"
      maxlength="24" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <div class="field-hint">2–24 characters · letters, numbers, underscores only</div>
    <div class="field-err" id="usernameErr"></div>
    <button class="modal-btn" onclick="handleJoin()">Enter Chat Room →</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app">
  <header class="chat-header">
    <a class="header-back" href="dashboard.html" title="Back to Dashboard">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="header-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.8">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div class="header-info">
      <div class="header-title">Traders Chat Room</div>
      <div class="header-sub" id="headerSub">Initialising…</div>
    </div>
    <div class="conn-pill connecting" id="connPill">
      <span class="conn-dot"></span>
      <span id="connTxt">CONNECTING</span>
    </div>
  </header>

  <div class="user-strip" id="userStrip" style="display:none;">
    <div class="user-strip-av" id="userStripAv"></div>
    <span class="user-strip-name" id="userStripName"></span>
    <span class="user-strip-badge">YOU</span>
    <span class="user-strip-change" onclick="changeUsername()">Change</span>
  </div>

  <div class="load-overlay" id="loadOverlay">
    <div class="load-spinner"></div>
    <div class="load-txt" id="loadTxt">Connecting to Firebase…</div>
  </div>

  <div class="messages-wrap" id="messagesWrap" style="display:none;"></div>

  <button class="new-msg-pill hidden" id="newMsgPill" onclick="scrollToBottom(true)">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    New messages
  </button>

  <div class="typing-bar" id="typingBar"></div>

  <div class="input-area">
    <div class="input-wrap">
      <input class="chat-input" id="chatInput" type="text"
        placeholder="Message the trading room…"
        maxlength="500" autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="onInputChange()" onkeydown="onKeyDown(event)" disabled/>
      <span class="char-count" id="charCount"></span>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   TRADEXAI CHAT ENGINE
   Firebase 8.10.1 — classic window.firebase API
   firebase.initializeApp() / firebase.database()
═══════════════════════════════════════════════════════════ */

var MAX_MSG_LEN  = 500;
var MAX_USERNAME = 24;
var MSGS_LOAD    = 60;
var DEDUP_MS     = 1500;

var db           = null;
var msgRef       = null;   /* firebase.database().ref('community_messages') */
var liveQuery    = null;   /* ref used for the child_added live listener     */
var currentUser  = null;
var renderedKeys = {};
var isAtBottom   = true;
var lastSentAt   = 0;
var lastSentMsg  = '';

var AVATAR_COLORS = [
  '#5b78ff','#7c5cfc','#00c87a','#f5b731',
  '#38bdf8','#fb923c','#ff4d6d','#00d4a8',
  '#a78bfa','#34d399','#f472b6','#60a5fa'
];

function avatarColor(name) {
  var h = 0;
  for (var i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function avatarInitials(name) { return name.substring(0, 2).toUpperCase(); }

/* ─── fatal error display ─── */
function showFatalError(msg) {

  setConnState('error', 'ERROR');

  document.getElementById('loadTxt').textContent   = msg;

}

/* ══════════════════════════════════
   USERNAME
══════════════════════════════════ */
function isValidUsername(u) {
  return u && u.length >= 2 && u.length <= MAX_USERNAME && /^[\w\d_]+$/.test(u);
}

function handleJoin() {
  var raw = (document.getElementById('usernameInput').value || '').trim();
  if (!raw)                     { showModalErr('Please enter a username.'); return; }
  if (raw.length < 2)           { showModalErr('Username must be at least 2 characters.'); return; }
  if (!/^[\w\d_]+$/.test(raw)) { showModalErr('Only letters, numbers, and underscores allowed.'); return; }

  document.getElementById('usernameErr').classList.remove('show');
  localStorage.setItem('tradexai_username', raw);
  applyUser(raw);
  document.getElementById('usernameModal').classList.add('hidden');
  document.getElementById('loadOverlay').classList.remove('hidden');
  document.getElementById('loadTxt').textContent = 'Loading messages…';
  initChat();
}

function showModalErr(msg) {
  var el = document.getElementById('usernameErr');
  el.textContent = msg; el.classList.add('show');
}

function applyUser(name) {
  currentUser = name;
  var color = avatarColor(name);
  document.getElementById('userStrip').style.display = 'flex';
  var av = document.getElementById('userStripAv');
  av.style.background = color;
  av.textContent = avatarInitials(name);
  document.getElementById('userStripName').textContent = name;
}

function changeUsername() {
  localStorage.removeItem('tradexai_username');
  currentUser = null;
  detachLive();
  renderedKeys = {};
  var wrap = document.getElementById('messagesWrap');
  wrap.innerHTML  = '';
  wrap.style.display = 'none';
  document.getElementById('userStrip').style.display = 'none';
  document.getElementById('loadOverlay').classList.remove('hidden');
  document.getElementById('loadTxt').textContent = 'Connecting to Firebase…';
  document.getElementById('chatInput').disabled = true;
  document.getElementById('sendBtn').disabled   = true;
  setConnState('connecting', 'CONNECTING');
  document.getElementById('headerSub').textContent = 'Initialising…';
  document.getElementById('usernameInput').value  = '';
  document.getElementById('usernameErr').classList.remove('show');
  document.getElementById('usernameModal').classList.remove('hidden');
  setTimeout(function () { document.getElementById('usernameInput').focus(); }, 300);
}

/* ══════════════════════════════════
   INIT CHAT
══════════════════════════════════ */
function initChat() {
  if (!db) { showFatalError('Firebase database not ready.'); return; }
  setConnState('connecting', 'CONNECTING');
  document.getElementById('headerSub').textContent = 'Connecting…';
  loadHistory();
}

function detachLive() {
  if (liveQuery) {
    liveQuery.off('child_added');
    liveQuery = null;
  }
}

/*
  1. Fetch last MSGS_LOAD messages with .once('value')
  2. Render them all at once
  3. Attach a child_added listener starting AFTER the last timestamp
     so only brand-new messages come through the live pipe
*/
function loadHistory() {
  detachLive();
  renderedKeys = {};

  msgRef
    .orderByChild('timestamp')
    .limitToLast(MSGS_LOAD)
    .once('value', function (snapshot) {

      var wrap = document.getElementById('messagesWrap');
      wrap.innerHTML = '';

      var rows = [];
      snapshot.forEach(function (child) {
        rows.push({ key: child.key, val: child.val() });
        renderedKeys[child.key] = true;
      });

      if (!rows.length) {
        renderEmpty(wrap);
      } else {
        var lastDate = null, lastUser = null;
        rows.forEach(function (r, idx) {
          var msgDate = new Date(r.val.timestamp).toDateString();
          if (msgDate !== lastDate) {
            wrap.appendChild(makeDateDivider(r.val.timestamp));
            lastDate = msgDate; lastUser = null;
          }
          var isOwn       = r.val.username === currentUser;
          var consecutive = lastUser === r.val.username;
          var nextSame    = rows[idx + 1] && rows[idx + 1].val.username === r.val.username;
          wrap.appendChild(makeMsgRow(r.val, isOwn, consecutive, nextSame));
          lastUser = r.val.username;
        });
      }

      document.getElementById('loadOverlay').classList.add('hidden');
      wrap.style.display = 'flex';
      scrollToBottom(false);

      /* Mark live */
      setConnState('connected', 'LIVE');
      document.getElementById('headerSub').textContent = 'Live · Traders Chat Room';
      document.getElementById('chatInput').disabled = false;
      document.getElementById('sendBtn').disabled   = false;
      setTimeout(function () { document.getElementById('chatInput').focus(); }, 150);

      /* Live listener: only messages AFTER the last history timestamp */
      var afterTs = rows.length ? rows[rows.length - 1].val.timestamp : Date.now();

      liveQuery = msgRef.orderByChild('timestamp').startAt(afterTs + 1, 'timestamp');
      liveQuery.on('child_added',
        function (child) {
          if (renderedKeys[child.key]) return; /* skip history overlap */
          renderedKeys[child.key] = true;
          appendLive(child.val());
          if (!isAtBottom) document.getElementById('newMsgPill').classList.remove('hidden');
        },
        function (err) {
          console.error('[TradeXAI] Live error:', err.code, err.message);
          setConnState('error', 'RECONNECTING');
          document.getElementById('headerSub').textContent = 'Reconnecting…';
          setTimeout(loadHistory, 4000);
        }
      );

    }, function (err) {
      console.error('[TradeXAI] Load error:', err.code, err.message);
      setConnState('error', 'ERROR');
      document.getElementById('headerSub').textContent = 'Connection failed';
      document.getElementById('loadTxt').textContent   = err.message || 'Load failed';
      showToast('Could not load messages: ' + (err.message || 'Unknown error'), 6000);
    });
}

/* ══════════════════════════════════
   SEND MESSAGE
══════════════════════════════════ */
function sendMessage() {
  if (!db || !msgRef) { showToast('Firebase not ready.'); return; }
  if (!currentUser)   { showToast('No username set.'); return; }

  var input = document.getElementById('chatInput');
  var msg   = (input.value || '').trim();
  if (!msg)                     { return; }
  if (msg.length > MAX_MSG_LEN) { showToast('Message too long (max 500 chars).'); return; }

  var now = Date.now();
  if (msg === lastSentMsg && now - lastSentAt < DEDUP_MS) {
    showToast('Slow down — duplicate blocked.'); return;
  }
  lastSentMsg = msg; lastSentAt = now;

  input.value = ''; updateCharCount(''); input.focus();

  var btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.classList.add('pulse');
  setTimeout(function () { btn.classList.remove('pulse'); btn.disabled = false; }, 500);

  msgRef.push({
    username:  currentUser,
    message:   msg,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  }).catch(function (err) {
    console.error('[TradeXAI] Send error:', err);
    showToast('Send failed: ' + err.message);
    input.value = msg; updateCharCount(msg);
  });
}

function onKeyDown(e)   { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function onInputChange() { updateCharCount(document.getElementById('chatInput').value || ''); }
function updateCharCount(v) {
  var el = document.getElementById('charCount'), len = v.length;
  if (len === 0) { el.textContent = ''; return; }
  el.textContent = len + '/' + MAX_MSG_LEN;
  el.className = 'char-count' + (len > MAX_MSG_LEN ? ' over' : len > MAX_MSG_LEN * 0.8 ? ' warn' : '');
}

/* ══════════════════════════════════
   RENDER HELPERS
══════════════════════════════════ */
function renderEmpty(wrap) {
  var el = document.createElement('div');
  el.className = 'empty-chat'; el.id = 'emptyChat';
  el.innerHTML =
    '<div class="empty-icon-wrap"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(91,120,255,0.45)" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>'
    + '<div class="empty-title">No messages yet</div>'
    + '<div class="empty-sub">Be the first to say something to the trading community!</div>';
  wrap.appendChild(el);
}

function appendLive(val) {
  var wrap  = document.getElementById('messagesWrap');
  var empty = document.getElementById('emptyChat');
  if (empty) empty.remove();

  /* Date divider when the day changes */
  var allRows = wrap.querySelectorAll('.msg-row');
  var prevRow = allRows.length ? allRows[allRows.length - 1] : null;
  var prevTs  = prevRow ? parseInt(prevRow.dataset.ts || '0', 10) : 0;
  if (!prevTs || new Date(prevTs).toDateString() !== new Date(val.timestamp).toDateString()) {
    wrap.appendChild(makeDateDivider(val.timestamp));
  }

  var prevUser    = prevRow ? prevRow.dataset.user : null;
  var consecutive = prevUser === val.username;
  wrap.appendChild(makeMsgRow(val, val.username === currentUser, consecutive, false));
  if (isAtBottom) scrollToBottom(true);
}

function makeDateDivider(ts) {
  var d = document.createElement('div'); d.className = 'date-divider';
  var date = new Date(ts), today = new Date(), yest = new Date(today);
  yest.setDate(today.getDate() - 1);
  var label = date.toDateString() === today.toDateString() ? 'Today'
    : date.toDateString() === yest.toDateString() ? 'Yesterday'
    : date.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  d.innerHTML =
    '<div class="date-divider-line"></div>'
    + '<div class="date-divider-txt">' + label + '</div>'
    + '<div class="date-divider-line"></div>';
  return d;
}

function makeMsgRow(val, isOwn, consecutive, nextSame) {
  var color    = avatarColor(val.username);
  var initials = avatarInitials(val.username);
  var time     = formatTime(val.timestamp);

  var row = document.createElement('div');
  row.className    = 'msg-row' + (isOwn ? ' own' : '');
  row.dataset.user = val.username;
  row.dataset.ts   = val.timestamp;

  var bubbleCls = 'msg-bubble';
  if (consecutive) bubbleCls += ' cont-top';
  if (nextSame)    bubbleCls += ' cont-bot';

  var metaHtml = consecutive ? '' :
    '<div class="msg-meta">'
    + '<span class="msg-username" style="color:' + color + '">' + esc(val.username) + '</span>'
    + '<span class="msg-time">' + time + '</span>'
    + '</div>';

  row.innerHTML =
    '<div class="msg-avatar' + (consecutive ? ' hidden' : '') + '" style="background:' + color + '">'
    + esc(initials) + '</div>'
    + '<div class="msg-group">'
    + metaHtml
    + '<div class="' + bubbleCls + '"><span class="msg-txt">' + esc(val.message) + '</span></div>'
    + '</div>';

  return row;
}

/* ══════════════════════════════════
   SCROLL + UI HELPERS
══════════════════════════════════ */
function scrollToBottom(smooth) {
  var wrap = document.getElementById('messagesWrap');
  if (smooth) { wrap.scrollTo({ top: wrap.scrollHeight, behavior: 'smooth' }); }
  else        { wrap.scrollTop = wrap.scrollHeight; }
  isAtBottom = true;
  document.getElementById('newMsgPill').classList.add('hidden');
}

function onScroll() {
  var wrap = document.getElementById('messagesWrap');
  isAtBottom = (wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight) < 120;
  if (isAtBottom) document.getElementById('newMsgPill').classList.add('hidden');
}

function setConnState(state, label) {
  document.getElementById('connPill').className   = 'conn-pill ' + state;
  document.getElementById('connTxt').textContent  = label;
}

var _toastTimer = null;
function showToast(msg, dur) {
  var old = document.querySelector('.toast');
  if (old) old.remove();
  if (_toastTimer) clearTimeout(_toastTimer);
  var t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  _toastTimer = setTimeout(function () { if (t.parentNode) t.remove(); }, dur || 3500);
}

function formatTime(ts) {
  var d = new Date(ts), h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  return h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#39;');
}
